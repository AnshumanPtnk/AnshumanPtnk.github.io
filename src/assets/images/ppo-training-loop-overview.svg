<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
<title id="title">PPO training loop overview</title>
<desc id="desc">A cyclic diagram showing policy rollout collection, return and advantage computation, multiple clipped optimization epochs, and fresh data collection.</desc>
<style>
  .bg { fill: #faf9f6; }
  .box { fill: #ffffff; stroke: #25324a; stroke-width: 2.4; rx: 20; }
  .accent { fill: #eef3ff; stroke: #3559a6; stroke-width: 2.8; rx: 20; }
  .safe { fill: #eef8f1; stroke: #2d7a4b; stroke-width: 2.8; rx: 20; }
  .warn { fill: #fff4e8; stroke: #a76120; stroke-width: 2.8; rx: 20; }
  .title { font: 700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #172033; }
  .label { font: 700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #172033; }
  .body { font: 500 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #354056; }
  .small { font: 500 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #4c566d; }
  .arrow { fill: none; stroke: #52617a; stroke-width: 4; marker-end: url(#arrow); }
  .loop { fill: none; stroke: #3559a6; stroke-width: 4.5; marker-end: url(#arrowBlue); }
  .divider { stroke: #c8ced8; stroke-width: 2; stroke-dasharray: 8 8; }
</style>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#52617a"/>
  </marker>
  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#3559a6"/>
  </marker>
</defs>
<rect class="bg" x="0" y="0" width="1400" height="980"/>
<text class="title" x="700" y="58" text-anchor="middle">One Complete PPO Iteration</text>

<rect class="accent" x="500" y="95" width="400" height="115" rx="20"/>
<text class="label" x="700" y="138" text-anchor="middle">Current Policy π_old</text>
<text class="body" x="700" y="173" text-anchor="middle">Frozen while experience is collected</text>

<path class="arrow" d="M700 210 L700 265"/>

<rect class="box" x="440" y="265" width="520" height="130" rx="20"/>
<text class="label" x="700" y="310" text-anchor="middle">1. Collect Rollouts</text>
<text class="body" x="700" y="346" text-anchor="middle">states · actions · rewards · terminals</text>
<text class="body" x="700" y="376" text-anchor="middle">old action log-probabilities</text>

<path class="arrow" d="M700 395 L700 450"/>

<rect class="box" x="440" y="450" width="520" height="132" rx="20"/>
<text class="label" x="700" y="494" text-anchor="middle">2. Build Learning Targets</text>
<text class="body" x="700" y="531" text-anchor="middle">returns G_t · values V(s_t)</text>
<text class="body" x="700" y="562" text-anchor="middle">advantages Â_t = G_t − V(s_t)</text>

<path class="arrow" d="M700 582 L700 637"/>

<rect class="safe" x="365" y="637" width="670" height="180" rx="20"/>
<text class="label" x="700" y="680" text-anchor="middle">3. Reuse the Same Batch for K Epochs</text>
<text class="body" x="700" y="718" text-anchor="middle">recompute current log-probabilities</text>
<text class="body" x="700" y="748" text-anchor="middle">ratio r_t = π_θ(a_t|s_t) / π_old(a_t|s_t)</text>
<text class="body" x="700" y="778" text-anchor="middle">clipped actor objective · critic regression · entropy</text>

<line class="divider" x1="700" y1="817" x2="700" y2="862"/>

<rect class="warn" x="450" y="862" width="500" height="92" rx="20"/>
<text class="label" x="700" y="901" text-anchor="middle">4. Discard Stale Batch</text>
<text class="small" x="700" y="932" text-anchor="middle">The improved policy collects fresh experience</text>

<path class="loop" d="M450 908 C150 908, 120 155, 500 155"/>
</svg>