<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="axisArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#fafaf9"/>
  <text x="600" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#1e293b">Prospect Theory — Value Is Relative, Not Absolute</text>
  <text x="600" y="67" text-anchor="middle" font-size="13" fill="#64748b">The reference point divides perceived outcomes into gains and losses</text>

  <rect x="80" y="100" width="1040" height="500" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="100" y="120" width="500" height="450" fill="#fef2f2" opacity="0.75"/>
  <rect x="600" y="120" width="500" height="450" fill="#f0fdf4" opacity="0.75"/>
  <text x="340" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">LOSSES</text>
  <text x="860" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">GAINS</text>

  <line x1="120" y1="350" x2="1085" y2="350" stroke="#64748b" stroke-width="1.8" marker-end="url(#axisArrow)"/>
  <line x1="600" y1="565" x2="600" y2="125" stroke="#64748b" stroke-width="1.8" marker-end="url(#axisArrow)"/>
  <text x="1080" y="378" text-anchor="end" font-size="12" fill="#475569">objective outcome relative to reference</text>
  <text x="628" y="145" font-size="12" fill="#475569">subjective value</text>

  <line x1="600" y1="120" x2="600" y2="570" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5 5"/>
  <circle cx="600" cy="350" r="6" fill="#1e293b"/>
  <rect x="510" y="365" width="180" height="46" rx="9" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="600" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">reference point</text>
  <text x="600" y="400" text-anchor="middle" font-size="10" fill="#64748b">gain/loss = 0</text>

  <path d="M125 585 C420 565 555 455 600 350" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
  <path d="M600 350 C635 275 760 165 1080 135" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round"/>

  <circle cx="395" cy="525" r="6" fill="#dc2626"/>
  <circle cx="805" cy="185" r="6" fill="#16a34a"/>
  <line x1="395" y1="350" x2="395" y2="525" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="805" y1="185" x2="805" y2="350" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="395" y1="350" x2="805" y2="350" stroke="#94a3b8" stroke-width="2"/>
  <text x="395" y="338" text-anchor="middle" font-size="11" fill="#991b1b">−k</text>
  <text x="805" y="338" text-anchor="middle" font-size="11" fill="#166534">+k</text>

  <rect x="120" y="185" width="300" height="92" rx="12" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="270" y="211" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Loss aversion</text>
  <text x="270" y="233" text-anchor="middle" font-size="11" fill="#7f1d1d">The pain at −k is larger than</text>
  <text x="270" y="252" text-anchor="middle" font-size="11" fill="#7f1d1d">the pleasure at an equal +k.</text>

  <rect x="790" y="430" width="280" height="92" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="930" y="456" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Diminishing sensitivity</text>
  <text x="930" y="478" text-anchor="middle" font-size="11" fill="#14532d">The curve flattens as the outcome</text>
  <text x="930" y="497" text-anchor="middle" font-size="11" fill="#14532d">moves farther from the reference.</text>

  <rect x="180" y="625" width="840" height="42" rx="12" fill="#f1f5f9"/>
  <text x="600" y="651" text-anchor="middle" font-size="11.5" fill="#475569">For KTO, the “outcome” is the policy/reference log-ratio and the reference point is a KL-derived baseline.</text>
</svg>
