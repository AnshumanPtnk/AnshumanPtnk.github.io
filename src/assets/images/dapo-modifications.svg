<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#111; }
      .label { font: 600 20px Arial, sans-serif; fill:#111; }
      .text { font: 17px Arial, sans-serif; fill:#222; }
      .small { font: 15px Arial, sans-serif; fill:#333; }
      .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:16; }
      .soft { fill:#eef3f8; stroke:#334; stroke-width:2; rx:16; }
      .good { fill:#eef7ef; stroke:#355e3b; stroke-width:2; rx:16; }
      .warn { fill:#fff5e6; stroke:#8a5a00; stroke-width:2; rx:16; }
      .bad { fill:#fdeeee; stroke:#8b2f2f; stroke-width:2; rx:16; }
      .arrow { stroke:#333; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="48" class="title">DAPO: four targeted fixes on top of GRPO</text>
  
<rect x="60" y="110" width="500" height="190" class="good"/><text x="310" y="150" text-anchor="middle" class="label">1. Clip-Higher</text><text x="310" y="190" text-anchor="middle" class="text">ε_high &gt; ε_low</text><text x="310" y="228" text-anchor="middle" class="small">rare promising tokens get more room to grow</text>
<rect x="640" y="110" width="500" height="190" class="soft"/><text x="890" y="150" text-anchor="middle" class="label">2. Dynamic sampling</text><text x="890" y="190" text-anchor="middle" class="text">drop all-correct / all-wrong groups</text><text x="890" y="228" text-anchor="middle" class="small">spend rollout compute where rewards disagree</text>
<rect x="60" y="370" width="500" height="190" class="warn"/><text x="310" y="410" text-anchor="middle" class="label">3. Token-level aggregation</text><text x="310" y="450" text-anchor="middle" class="text">average over all valid tokens</text><text x="310" y="488" text-anchor="middle" class="small">avoid per-response length weighting</text>
<rect x="640" y="370" width="500" height="190" class="bad"/><text x="890" y="410" text-anchor="middle" class="label">4. Overlong shaping</text><text x="890" y="450" text-anchor="middle" class="text">soft penalty beyond length region</text><text x="890" y="488" text-anchor="middle" class="small">reduce truncation noise and verbosity drift</text>

</svg>