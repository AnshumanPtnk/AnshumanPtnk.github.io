<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="bigArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="#fafaf9"/>
  <text x="600" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#1e293b">Classical RLHF vs. DPO</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#64748b">Two ways of turning human preferences into a trained policy</text>

  <!-- LEFT: Classical RLHF -->
  <text x="270" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Classical RLHF — four moving parts</text>

  <rect x="110" y="115" width="320" height="46" rx="8" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="270" y="143" text-anchor="middle" font-size="13" fill="#1e293b">Human Preferences (yw ≻ yl)</text>

  <line x1="270" y1="161" x2="270" y2="186" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="110" y="186" width="320" height="46" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="270" y="214" text-anchor="middle" font-size="13" fill="#1e293b">Reward Model (trained)</text>

  <line x1="270" y1="232" x2="270" y2="257" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="257" width="380" height="175" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-dasharray="5 4"/>
  <text x="270" y="279" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">PPO Loop</text>

  <rect x="95" y="291" width="105" height="40" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="147" y="308" text-anchor="middle" font-size="10.5" fill="#1e293b">Policy</text>
  <text x="147" y="321" text-anchor="middle" font-size="10.5" fill="#1e293b">(trainable)</text>

  <rect x="215" y="291" width="115" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="272" y="308" text-anchor="middle" font-size="10.5" fill="#1e293b">Frozen</text>
  <text x="272" y="321" text-anchor="middle" font-size="10.5" fill="#1e293b">Reference</text>

  <rect x="345" y="291" width="100" height="40" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="395" y="308" text-anchor="middle" font-size="10.5" fill="#1e293b">Critic</text>
  <text x="395" y="321" text-anchor="middle" font-size="10.5" fill="#1e293b">(trainable)</text>

  <line x1="147" y1="331" x2="147" y2="350" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="147" y1="350" x2="440" y2="350" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="440" y1="350" x2="440" y2="331" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="365" text-anchor="middle" font-size="10" fill="#64748b">fresh rollouts sampled every step</text>

  <path d="M270,331 L270,395" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="270" y="410" text-anchor="middle" font-size="10" fill="#64748b">scored by reward model</text>

  <text x="270" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Needs: 1 policy + 1 reference</text>
  <text x="270" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">+ 1 reward model + 1 critic</text>
  <text x="270" y="486" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">+ an online sampling loop</text>

  <!-- Big arrow across the middle -->
  <line x1="490" y1="300" x2="700" y2="300" stroke="#b45309" stroke-width="3" marker-end="url(#bigArrow)"/>
  <text x="595" y="280" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">collapses into</text>
  <text x="595" y="322" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">one classification loss</text>

  <!-- RIGHT: DPO -->
  <text x="930" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">DPO — one loss, two models</text>

  <rect x="770" y="115" width="320" height="46" rx="8" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="930" y="143" text-anchor="middle" font-size="13" fill="#1e293b">Human Preferences (yw ≻ yl)</text>

  <line x1="930" y1="161" x2="930" y2="186" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="745" y="186" width="370" height="70" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="930" y="212" text-anchor="middle" font-size="12" fill="#1e293b">L_DPO = −log σ( β·log-ratio(yw) − β·log-ratio(yl) )</text>
  <text x="930" y="230" text-anchor="middle" font-size="10.5" fill="#78716c">a single supervised classification loss</text>
  <text x="930" y="246" text-anchor="middle" font-size="10.5" fill="#78716c">no reward model · no sampling · no RL loop</text>

  <line x1="850" y1="256" x2="850" y2="290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1010" y1="256" x2="1010" y2="290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="785" y="290" width="130" height="46" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="850" y="309" text-anchor="middle" font-size="11" fill="#1e293b">Policy</text>
  <text x="850" y="323" text-anchor="middle" font-size="11" fill="#1e293b">(trainable)</text>

  <rect x="945" y="290" width="130" height="46" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="1010" y="309" text-anchor="middle" font-size="11" fill="#1e293b">Frozen</text>
  <text x="1010" y="323" text-anchor="middle" font-size="11" fill="#1e293b">Reference</text>

  <text x="930" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Needs: 1 policy + 1 reference.</text>
  <text x="930" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">No reward model, no critic,</text>
  <text x="930" y="486" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">no online sampling.</text>

  <line x1="600" y1="520" x2="600" y2="520" stroke="none"/>
  <text x="600" y="560" text-anchor="middle" font-size="11.5" fill="#94a3b8">Same input, same optimum — DPO removes the two trainable components (reward model, critic) and the sampling loop between them.</text>
</svg>
