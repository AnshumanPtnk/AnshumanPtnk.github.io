<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#111; }
      .label { font: 600 20px Arial, sans-serif; fill:#111; }
      .text { font: 17px Arial, sans-serif; fill:#222; }
      .small { font: 15px Arial, sans-serif; fill:#333; }
      .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:16; }
      .soft { fill:#eef3f8; stroke:#334; stroke-width:2; rx:16; }
      .good { fill:#eef7ef; stroke:#355e3b; stroke-width:2; rx:16; }
      .warn { fill:#fff5e6; stroke:#8a5a00; stroke-width:2; rx:16; }
      .bad { fill:#fdeeee; stroke:#8b2f2f; stroke-width:2; rx:16; }
      .arrow { stroke:#333; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="48" class="title">PPO and GRPO: same actor update, different advantage source</text>
  
<rect x="50" y="90" width="500" height="520" class="warn"/>
<text x="300" y="135" text-anchor="middle" class="label">PPO</text>
<rect x="110" y="180" width="380" height="70" class="soft"/><text x="300" y="223" text-anchor="middle" class="text">Policy generates trajectory</text>
<rect x="110" y="295" width="380" height="70" class="box"/><text x="300" y="338" text-anchor="middle" class="text">Critic estimates V(s_t)</text>
<rect x="110" y="410" width="380" height="70" class="box"/><text x="300" y="453" text-anchor="middle" class="text">GAE / per-step advantage</text>
<rect x="110" y="525" width="380" height="55" class="good"/><text x="300" y="560" text-anchor="middle" class="text">Clipped PPO update</text>
<path d="M300 250 L300 295" class="arrow"/><path d="M300 365 L300 410" class="arrow"/><path d="M300 480 L300 525" class="arrow"/>
<rect x="650" y="90" width="500" height="520" class="good"/>
<text x="900" y="135" text-anchor="middle" class="label">GRPO</text>
<rect x="710" y="180" width="380" height="70" class="soft"/><text x="900" y="211" text-anchor="middle" class="text">Policy generates a group</text><text x="900" y="236" text-anchor="middle" class="small">G responses for one prompt</text>
<rect x="710" y="295" width="380" height="70" class="box"/><text x="900" y="338" text-anchor="middle" class="text">Verifier returns group rewards</text>
<rect x="710" y="410" width="380" height="70" class="box"/><text x="900" y="453" text-anchor="middle" class="text">Group-relative advantage</text>
<rect x="710" y="525" width="380" height="55" class="good"/><text x="900" y="560" text-anchor="middle" class="text">Same clipped PPO update</text>
<path d="M900 250 L900 295" class="arrow"/><path d="M900 365 L900 410" class="arrow"/><path d="M900 480 L900 525" class="arrow"/>

</svg>