<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#111; }
      .label { font: 600 20px Arial, sans-serif; fill:#111; }
      .text { font: 17px Arial, sans-serif; fill:#222; }
      .small { font: 15px Arial, sans-serif; fill:#333; }
      .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:16; }
      .soft { fill:#eef3f8; stroke:#334; stroke-width:2; rx:16; }
      .good { fill:#eef7ef; stroke:#355e3b; stroke-width:2; rx:16; }
      .warn { fill:#fff5e6; stroke:#8a5a00; stroke-width:2; rx:16; }
      .bad { fill:#fdeeee; stroke:#8b2f2f; stroke-width:2; rx:16; }
      .arrow { stroke:#333; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="48" class="title">The group is a prompt-specific leaderboard</text>
  
<rect x="470" y="90" width="260" height="90" class="soft"/><text x="600" y="125" text-anchor="middle" class="label">Prompt q</text><text x="600" y="154" text-anchor="middle" class="small">sample six responses</text>
<path d="M600 180 L600 230" class="arrow"/>
<line x1="150" y1="360" x2="1050" y2="360" stroke="#333" stroke-width="4"/>
<text x="1070" y="367" class="small">reward</text>
<line x1="600" y1="330" x2="600" y2="390" stroke="#333" stroke-width="4"/>
<text x="600" y="420" text-anchor="middle" class="label">group mean μ = 0.667</text>
<circle cx="830" cy="300" r="36" fill="#eef7ef" stroke="#355e3b" stroke-width="3"/><text x="830" y="307" text-anchor="middle" class="label">1</text>
<circle cx="900" cy="300" r="36" fill="#eef7ef" stroke="#355e3b" stroke-width="3"/><text x="900" y="307" text-anchor="middle" class="label">1</text>
<circle cx="970" cy="300" r="36" fill="#eef7ef" stroke="#355e3b" stroke-width="3"/><text x="970" y="307" text-anchor="middle" class="label">1</text>
<circle cx="760" cy="300" r="36" fill="#eef7ef" stroke="#355e3b" stroke-width="3"/><text x="760" y="307" text-anchor="middle" class="label">1</text>
<circle cx="260" cy="300" r="36" fill="#fdeeee" stroke="#8b2f2f" stroke-width="3"/><text x="260" y="307" text-anchor="middle" class="label">0</text>
<circle cx="330" cy="300" r="36" fill="#fdeeee" stroke="#8b2f2f" stroke-width="3"/><text x="330" y="307" text-anchor="middle" class="label">0</text>
<text x="865" y="500" text-anchor="middle" class="text">Above mean → positive advantage → increase probability</text>
<text x="295" y="540" text-anchor="middle" class="text">Below mean → negative advantage → decrease probability</text>

</svg>