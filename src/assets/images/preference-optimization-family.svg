<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#fafaf9"/>
  <text x="600" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#1e293b">From RLHF to Direct Preference Optimization</text>
  <text x="600" y="66" text-anchor="middle" font-size="13" fill="#64748b">Each method removes a different piece of the training pipeline</text>

  <rect x="65" y="105" width="195" height="68" rx="12" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="162" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Feedback data</text>
  <text x="162" y="153" text-anchor="middle" font-size="11.5" fill="#475569">pairs or good/bad labels</text>

  <line x1="260" y1="139" x2="315" y2="139" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="315" y="95" width="205" height="88" rx="12" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="417" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Classical RLHF</text>
  <text x="417" y="146" text-anchor="middle" font-size="11" fill="#1e40af">reward model + PPO</text>
  <text x="417" y="164" text-anchor="middle" font-size="11" fill="#1e40af">critic + online rollouts</text>

  <line x1="520" y1="139" x2="585" y2="139" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="585" y="95" width="255" height="88" rx="12" fill="#fef3c7" stroke="#d97706"/>
  <text x="712" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Offline direct objectives</text>
  <text x="712" y="146" text-anchor="middle" font-size="11" fill="#92400e">no reward-model training</text>
  <text x="712" y="164" text-anchor="middle" font-size="11" fill="#92400e">no online RL loop</text>

  <line x1="840" y1="139" x2="1135" y2="139" stroke="#94a3b8" stroke-width="2"/>
  <line x1="1135" y1="139" x2="1135" y2="220" stroke="#94a3b8" stroke-width="2"/>
  <line x1="712" y1="183" x2="712" y2="220" stroke="#94a3b8" stroke-width="2"/>
  <line x1="712" y1="220" x2="1135" y2="220" stroke="#94a3b8" stroke-width="2"/>

  <line x1="150" y1="220" x2="1050" y2="220" stroke="#94a3b8" stroke-width="2"/>
  <line x1="150" y1="220" x2="150" y2="275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="220" x2="450" y2="275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="220" x2="750" y2="275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1050" y1="220" x2="1050" y2="275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="35" y="275" width="230" height="270" rx="16" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <rect x="35" y="275" width="230" height="52" rx="16" fill="#dbeafe"/>
  <path d="M35 311 L35 327 L265 327 L265 311" fill="#dbeafe"/>
  <text x="150" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#1e40af">DPO</text>
  <text x="150" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Pairwise feedback</text>
  <text x="150" y="378" text-anchor="middle" font-size="11" fill="#475569">chosen vs rejected</text>
  <rect x="72" y="405" width="156" height="29" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="150" y="424" text-anchor="middle" font-size="10.5" fill="#1e40af">frozen reference ✓</text>
  <text x="150" y="467" text-anchor="middle" font-size="11" fill="#475569">Score:</text>
  <text x="150" y="489" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">policy / reference</text>
  <text x="150" y="521" text-anchor="middle" font-size="10.5" fill="#64748b">separate alignment stage</text>

  <rect x="335" y="275" width="230" height="270" rx="16" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <rect x="335" y="275" width="230" height="52" rx="16" fill="#dcfce7"/>
  <path d="M335 311 L335 327 L565 327 L565 311" fill="#dcfce7"/>
  <text x="450" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">SimPO</text>
  <text x="450" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Pairwise feedback</text>
  <text x="450" y="378" text-anchor="middle" font-size="11" fill="#475569">chosen vs rejected</text>
  <rect x="372" y="405" width="156" height="29" rx="14" fill="#f0fdf4" stroke="#86efac"/>
  <text x="450" y="424" text-anchor="middle" font-size="10.5" fill="#166534">reference-free</text>
  <text x="450" y="467" text-anchor="middle" font-size="11" fill="#475569">Score:</text>
  <text x="450" y="489" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">mean token log-prob</text>
  <text x="450" y="521" text-anchor="middle" font-size="10.5" fill="#64748b">target margin γ</text>

  <rect x="635" y="275" width="230" height="270" rx="16" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="635" y="275" width="230" height="52" rx="16" fill="#ede9fe"/>
  <path d="M635 311 L635 327 L865 327 L865 311" fill="#ede9fe"/>
  <text x="750" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#6d28d9">KTO</text>
  <text x="750" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Binary feedback</text>
  <text x="750" y="378" text-anchor="middle" font-size="11" fill="#475569">good or bad; no pair needed</text>
  <rect x="672" y="405" width="156" height="29" rx="14" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="750" y="424" text-anchor="middle" font-size="10.5" fill="#6d28d9">frozen reference ✓</text>
  <text x="750" y="467" text-anchor="middle" font-size="11" fill="#475569">Score:</text>
  <text x="750" y="489" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">gain/loss around KL</text>
  <text x="750" y="521" text-anchor="middle" font-size="10.5" fill="#64748b">class weights λD and λU</text>

  <rect x="935" y="275" width="230" height="270" rx="16" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <rect x="935" y="275" width="230" height="52" rx="16" fill="#fef3c7"/>
  <path d="M935 311 L935 327 L1165 327 L1165 311" fill="#fef3c7"/>
  <text x="1050" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#92400e">ORPO</text>
  <text x="1050" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Pairwise feedback</text>
  <text x="1050" y="378" text-anchor="middle" font-size="11" fill="#475569">chosen vs rejected</text>
  <rect x="972" y="405" width="156" height="29" rx="14" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="1050" y="424" text-anchor="middle" font-size="10.5" fill="#92400e">reference-free</text>
  <text x="1050" y="467" text-anchor="middle" font-size="11" fill="#475569">Score:</text>
  <text x="1050" y="489" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">chosen SFT + odds ratio</text>
  <text x="1050" y="521" text-anchor="middle" font-size="10.5" fill="#64748b">one monolithic stage</text>

  <rect x="130" y="590" width="940" height="64" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="600" y="616" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">The first design decision is the feedback format, not the loss function.</text>
  <text x="600" y="638" text-anchor="middle" font-size="11.5" fill="#64748b">Pairs naturally support DPO, SimPO, and ORPO; independent approval labels naturally support KTO.</text>
</svg>
