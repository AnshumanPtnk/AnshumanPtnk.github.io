<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="isArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#fafaf9"/>
  <text x="600" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#1e293b">Importance Sampling — Correct the Influence, Not the Data</text>
  <text x="600" y="67" text-anchor="middle" font-size="13" fill="#64748b">Samples come from q, but the desired expectation is under p</text>

  <rect x="55" y="105" width="330" height="455" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="220" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Observed under proposal q</text>
  <text x="220" y="158" text-anchor="middle" font-size="11" fill="#64748b">ten samples: 1 1 1 1 1  2 2 2  3 3</text>
  <line x1="95" y1="500" x2="350" y2="500" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="110" y="225" width="55" height="275" rx="5" fill="#60a5fa"/>
  <rect x="193" y="335" width="55" height="165" rx="5" fill="#60a5fa"/>
  <rect x="276" y="390" width="55" height="110" rx="5" fill="#60a5fa"/>
  <text x="137" y="522" text-anchor="middle" font-size="12" fill="#334155">x=1</text>
  <text x="220" y="522" text-anchor="middle" font-size="12" fill="#334155">x=2</text>
  <text x="303" y="522" text-anchor="middle" font-size="12" fill="#334155">x=3</text>
  <text x="137" y="214" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">q=0.5</text>
  <text x="220" y="324" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">q=0.3</text>
  <text x="303" y="379" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">q=0.2</text>
  <rect x="105" y="538" width="230" height="42" rx="10" fill="#eff6ff"/>
  <text x="220" y="564" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">naive mean = 1.7</text>

  <line x1="400" y1="330" x2="505" y2="330" stroke="#64748b" stroke-width="2.5" marker-end="url(#isArrow)"/>
  <text x="452" y="293" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">multiply by</text>
  <text x="452" y="314" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">w = p / q</text>

  <rect x="515" y="105" width="280" height="455" rx="16" fill="#ffffff" stroke="#d97706"/>
  <text x="655" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Importance weights</text>
  <rect x="555" y="195" width="200" height="70" rx="12" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="655" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">x=1 · w=0.20</text>
  <text x="655" y="244" text-anchor="middle" font-size="11" fill="#7f1d1d">over-sampled → downweight</text>
  <rect x="555" y="295" width="200" height="70" rx="12" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="655" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">x=2 · w=0.67</text>
  <text x="655" y="344" text-anchor="middle" font-size="11" fill="#78350f">slightly over-sampled</text>
  <rect x="555" y="395" width="200" height="70" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="655" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">x=3 · w=3.50</text>
  <text x="655" y="444" text-anchor="middle" font-size="11" fill="#14532d">under-sampled → upweight</text>
  <text x="655" y="515" text-anchor="middle" font-size="11" fill="#64748b">The observations stay unchanged.</text>
  <text x="655" y="535" text-anchor="middle" font-size="11" fill="#64748b">Only their contribution changes.</text>

  <line x1="810" y1="330" x2="890" y2="330" stroke="#64748b" stroke-width="2.5" marker-end="url(#isArrow)"/>

  <rect x="900" y="105" width="245" height="455" rx="16" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="1022" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Target view p</text>
  <line x1="930" y1="500" x2="1115" y2="500" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="945" y="445" width="42" height="55" rx="5" fill="#4ade80"/>
  <rect x="1001" y="390" width="42" height="110" rx="5" fill="#4ade80"/>
  <rect x="1057" y="115" width="42" height="385" rx="5" fill="#4ade80"/>
  <text x="966" y="522" text-anchor="middle" font-size="11" fill="#334155">1</text>
  <text x="1022" y="522" text-anchor="middle" font-size="11" fill="#334155">2</text>
  <text x="1078" y="522" text-anchor="middle" font-size="11" fill="#334155">3</text>
  <text x="966" y="434" text-anchor="middle" font-size="10.5" fill="#166534">p=.1</text>
  <text x="1022" y="379" text-anchor="middle" font-size="10.5" fill="#166534">p=.2</text>
  <text x="1078" y="143" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">p=.7</text>
  <rect x="930" y="538" width="185" height="42" rx="10" fill="#dcfce7"/>
  <text x="1022" y="564" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">weighted mean = 2.6</text>

  <rect x="165" y="615" width="870" height="40" rx="12" fill="#f1f5f9"/>
  <text x="600" y="640" text-anchor="middle" font-size="11.5" fill="#475569">Importance Sampling converts an average under q into an average under p by correcting each sample locally.</text>
</svg>
