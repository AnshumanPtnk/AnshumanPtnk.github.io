<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#111; }
      .label { font: 600 20px Arial, sans-serif; fill:#111; }
      .text { font: 17px Arial, sans-serif; fill:#222; }
      .small { font: 15px Arial, sans-serif; fill:#333; }
      .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:16; }
      .soft { fill:#eef3f8; stroke:#334; stroke-width:2; rx:16; }
      .good { fill:#eef7ef; stroke:#355e3b; stroke-width:2; rx:16; }
      .warn { fill:#fff5e6; stroke:#8a5a00; stroke-width:2; rx:16; }
      .bad { fill:#fdeeee; stroke:#8b2f2f; stroke-width:2; rx:16; }
      .arrow { stroke:#333; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="48" class="title">GRPO objective: term-by-term flow</text>
  
<rect x="40" y="110" width="190" height="100" class="soft"/><text x="135" y="148" text-anchor="middle" class="label">Old log-prob</text><text x="135" y="180" text-anchor="middle" class="small">log π_old</text>
<rect x="280" y="110" width="190" height="100" class="soft"/><text x="375" y="148" text-anchor="middle" class="label">New log-prob</text><text x="375" y="180" text-anchor="middle" class="small">log π_θ</text>
<rect x="520" y="110" width="190" height="100" class="box"/><text x="615" y="148" text-anchor="middle" class="label">Ratio</text><text x="615" y="180" text-anchor="middle" class="small">ρ = exp(logπθ−logπold)</text>
<rect x="760" y="110" width="190" height="100" class="good"/><text x="855" y="148" text-anchor="middle" class="label">Advantage</text><text x="855" y="180" text-anchor="middle" class="small">Aᵢ from group rewards</text>
<rect x="520" y="290" width="430" height="120" class="warn"/><text x="735" y="330" text-anchor="middle" class="label">Clipped surrogate</text><text x="735" y="365" text-anchor="middle" class="small">min(ρA, clip(ρ,1−ε,1+ε)A)</text>
<rect x="300" y="500" width="280" height="95" class="box"/><text x="440" y="538" text-anchor="middle" class="label">Token aggregation</text><text x="440" y="568" text-anchor="middle" class="small">mask prompt and padding</text>
<rect x="660" y="500" width="260" height="95" class="bad"/><text x="790" y="538" text-anchor="middle" class="label">KL penalty</text><text x="790" y="568" text-anchor="middle" class="small">β D_KL(πθ || πref)</text>
<rect x="450" y="640" width="300" height="80" class="good"/><text x="600" y="689" text-anchor="middle" class="label">Final policy loss</text>
<path d="M230 160 L520 160" class="arrow"/><path d="M470 160 L520 160" class="arrow"/><path d="M615 210 L615 290" class="arrow"/><path d="M855 210 L855 290" class="arrow"/><path d="M650 410 L500 500" class="arrow"/><path d="M790 595 L700 640" class="arrow"/><path d="M500 595 L540 640" class="arrow"/>

</svg>