<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#111; }
      .label { font: 600 20px Arial, sans-serif; fill:#111; }
      .text { font: 17px Arial, sans-serif; fill:#222; }
      .small { font: 15px Arial, sans-serif; fill:#333; }
      .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:16; }
      .soft { fill:#eef3f8; stroke:#334; stroke-width:2; rx:16; }
      .good { fill:#eef7ef; stroke:#355e3b; stroke-width:2; rx:16; }
      .warn { fill:#fff5e6; stroke:#8a5a00; stroke-width:2; rx:16; }
      .bad { fill:#fdeeee; stroke:#8b2f2f; stroke-width:2; rx:16; }
      .arrow { stroke:#333; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="48" class="title">Two ways to estimate expected reward</text>
  
<text x="300" y="95" text-anchor="middle" class="label">PPO: predict the baseline</text>
<rect x="90" y="130" width="420" height="95" class="soft"/><text x="300" y="168" text-anchor="middle" class="text">State / partial response</text><text x="300" y="197" text-anchor="middle" class="small">s_t</text>
<rect x="90" y="285" width="420" height="110" class="warn"/><text x="300" y="328" text-anchor="middle" class="label">Critic Vψ(s_t)</text><text x="300" y="362" text-anchor="middle" class="small">learned estimate of E[G_t | s_t]</text>
<path d="M300 225 L300 285" class="arrow"/>
<text x="900" y="95" text-anchor="middle" class="label">GRPO: measure the baseline</text>
<rect x="690" y="130" width="420" height="95" class="soft"/><text x="900" y="168" text-anchor="middle" class="text">One prompt q</text><text x="900" y="197" text-anchor="middle" class="small">sample G complete responses</text>
<rect x="690" y="285" width="420" height="110" class="good"/><text x="900" y="325" text-anchor="middle" class="label">Group mean</text><text x="900" y="358" text-anchor="middle" class="small">μ = (1/G) Σ rᵢ ≈ E[r | q]</text>
<path d="M900 225 L900 285" class="arrow"/>
<rect x="330" y="500" width="540" height="100" class="box"/><text x="600" y="538" text-anchor="middle" class="label">Same target, different economics</text><text x="600" y="571" text-anchor="middle" class="small">critic memory and training ↔ additional parallel rollouts</text>

</svg>