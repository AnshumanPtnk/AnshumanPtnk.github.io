<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#111; }
      .label { font: 600 20px Arial, sans-serif; fill:#111; }
      .text { font: 17px Arial, sans-serif; fill:#222; }
      .small { font: 15px Arial, sans-serif; fill:#333; }
      .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:16; }
      .soft { fill:#eef3f8; stroke:#334; stroke-width:2; rx:16; }
      .good { fill:#eef7ef; stroke:#355e3b; stroke-width:2; rx:16; }
      .warn { fill:#fff5e6; stroke:#8a5a00; stroke-width:2; rx:16; }
      .bad { fill:#fdeeee; stroke:#8b2f2f; stroke-width:2; rx:16; }
      .arrow { stroke:#333; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="48" class="title">Dead groups: equal rewards imply zero gradient</text>
  
<rect x="50" y="100" width="500" height="420" class="good"/>
<text x="300" y="145" text-anchor="middle" class="label">All correct</text>
<text x="300" y="205" text-anchor="middle" class="text">{1, 1, 1, 1}</text>
<text x="300" y="260" text-anchor="middle" class="text">μ = 1, σ = 0</text>
<text x="300" y="315" text-anchor="middle" class="text">Aᵢ = 1 − 1 = 0</text>
<text x="300" y="385" text-anchor="middle" class="label">No gradient</text>
<text x="300" y="430" text-anchor="middle" class="small">already solved uniformly</text>
<rect x="650" y="100" width="500" height="420" class="bad"/>
<text x="900" y="145" text-anchor="middle" class="label">All wrong</text>
<text x="900" y="205" text-anchor="middle" class="text">{0, 0, 0, 0}</text>
<text x="900" y="260" text-anchor="middle" class="text">μ = 0, σ = 0</text>
<text x="900" y="315" text-anchor="middle" class="text">Aᵢ = 0 − 0 = 0</text>
<text x="900" y="385" text-anchor="middle" class="label">No gradient</text>
<text x="900" y="430" text-anchor="middle" class="small">too difficult uniformly</text>
<rect x="330" y="565" width="540" height="85" class="warn"/><text x="600" y="600" text-anchor="middle" class="label">DAPO dynamic sampling</text><text x="600" y="630" text-anchor="middle" class="small">discard all-same groups and refill the batch with mixed groups</text>

</svg>