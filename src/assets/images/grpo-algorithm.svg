<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#111; }
      .label { font: 600 20px Arial, sans-serif; fill:#111; }
      .text { font: 17px Arial, sans-serif; fill:#222; }
      .small { font: 15px Arial, sans-serif; fill:#333; }
      .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:16; }
      .soft { fill:#eef3f8; stroke:#334; stroke-width:2; rx:16; }
      .good { fill:#eef7ef; stroke:#355e3b; stroke-width:2; rx:16; }
      .warn { fill:#fff5e6; stroke:#8a5a00; stroke-width:2; rx:16; }
      .bad { fill:#fdeeee; stroke:#8b2f2f; stroke-width:2; rx:16; }
      .arrow { stroke:#333; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="48" class="title">One GRPO training iteration</text>
  
<rect x="460" y="80" width="280" height="75" class="soft"/><text x="600" y="125" text-anchor="middle" class="label">Sample prompt batch</text>
<rect x="430" y="205" width="340" height="90" class="soft"/><text x="600" y="242" text-anchor="middle" class="label">Generate G responses</text><text x="600" y="270" text-anchor="middle" class="small">frozen old policy</text>
<rect x="430" y="345" width="340" height="90" class="good"/><text x="600" y="382" text-anchor="middle" class="label">Run verifier</text><text x="600" y="410" text-anchor="middle" class="small">correctness, format, length</text>
<rect x="430" y="485" width="340" height="90" class="box"/><text x="600" y="522" text-anchor="middle" class="label">Build group advantages</text><text x="600" y="550" text-anchor="middle" class="small">centre by prompt group</text>
<rect x="70" y="485" width="270" height="90" class="warn"/><text x="205" y="522" text-anchor="middle" class="label">Dynamic filter</text><text x="205" y="550" text-anchor="middle" class="small">remove dead groups</text>
<rect x="860" y="485" width="270" height="90" class="soft"/><text x="995" y="522" text-anchor="middle" class="label">Cache old log-probs</text><text x="995" y="550" text-anchor="middle" class="small">for importance ratios</text>
<rect x="430" y="625" width="340" height="90" class="warn"/><text x="600" y="662" text-anchor="middle" class="label">Optimise clipped loss</text><text x="600" y="690" text-anchor="middle" class="small">plus optional KL penalty</text>
<rect x="430" y="765" width="340" height="75" class="good"/><text x="600" y="810" text-anchor="middle" class="label">Refresh rollout policy</text>
<path d="M600 155 L600 205" class="arrow"/><path d="M600 295 L600 345" class="arrow"/><path d="M600 435 L600 485" class="arrow"/><path d="M430 530 L340 530" class="arrow"/><path d="M770 530 L860 530" class="arrow"/><path d="M600 575 L600 625" class="arrow"/><path d="M600 715 L600 765" class="arrow"/>
<path d="M770 802 C1080 802 1080 118 740 118" class="arrow"/>

</svg>