<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#111; }
      .label { font: 600 20px Arial, sans-serif; fill:#111; }
      .text { font: 17px Arial, sans-serif; fill:#222; }
      .small { font: 15px Arial, sans-serif; fill:#333; }
      .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:16; }
      .soft { fill:#eef3f8; stroke:#334; stroke-width:2; rx:16; }
      .good { fill:#eef7ef; stroke:#355e3b; stroke-width:2; rx:16; }
      .warn { fill:#fff5e6; stroke:#8a5a00; stroke-width:2; rx:16; }
      .bad { fill:#fdeeee; stroke:#8b2f2f; stroke-width:2; rx:16; }
      .arrow { stroke:#333; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="48" class="title">GRPO: end-to-end reasoning RL loop</text>
  
<rect x="40" y="100" width="180" height="90" class="soft"/><text x="130" y="138" text-anchor="middle" class="label">Prompt</text><text x="130" y="166" text-anchor="middle" class="small">q</text>
<rect x="280" y="90" width="210" height="110" class="soft"/><text x="385" y="130" text-anchor="middle" class="label">Old policy</text><text x="385" y="160" text-anchor="middle" class="small">sample G responses</text>
<rect x="560" y="80" width="240" height="130" class="box"/><text x="680" y="118" text-anchor="middle" class="label">Response group</text><text x="680" y="150" text-anchor="middle" class="small">o₁, o₂, …, o_G</text><text x="680" y="178" text-anchor="middle" class="small">same prompt, diverse attempts</text>
<rect x="870" y="90" width="250" height="110" class="good"/><text x="995" y="130" text-anchor="middle" class="label">Verifier</text><text x="995" y="160" text-anchor="middle" class="small">r₁, r₂, …, r_G</text>
<path d="M220 145 L280 145" class="arrow"/><path d="M490 145 L560 145" class="arrow"/><path d="M800 145 L870 145" class="arrow"/>
<rect x="150" y="300" width="270" height="120" class="box"/><text x="285" y="338" text-anchor="middle" class="label">Group baseline</text><text x="285" y="370" text-anchor="middle" class="small">μ = mean(r₁,…,r_G)</text><text x="285" y="398" text-anchor="middle" class="small">Aᵢ = (rᵢ − μ)/σ</text>
<rect x="490" y="300" width="290" height="120" class="warn"/><text x="635" y="338" text-anchor="middle" class="label">PPO-style surrogate</text><text x="635" y="370" text-anchor="middle" class="small">ratio × advantage</text><text x="635" y="398" text-anchor="middle" class="small">clip within trust region</text>
<rect x="850" y="300" width="250" height="120" class="good"/><text x="975" y="338" text-anchor="middle" class="label">Policy update</text><text x="975" y="370" text-anchor="middle" class="small">increase winners</text><text x="975" y="398" text-anchor="middle" class="small">suppress losers</text>
<path d="M995 200 C995 250 285 245 285 300" class="arrow"/><path d="M420 360 L490 360" class="arrow"/><path d="M780 360 L850 360" class="arrow"/>
<path d="M975 420 C975 555 385 555 385 200" class="arrow"/>
<text x="680" y="570" text-anchor="middle" class="text">No critic: the group mean supplies the baseline.</text>
<text x="680" y="602" text-anchor="middle" class="text">No learned reward model when correctness is programmatically verifiable.</text>

</svg>