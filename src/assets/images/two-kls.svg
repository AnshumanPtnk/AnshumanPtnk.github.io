<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img"><style>.bg{fill:#faf9f6}.box{fill:#fff;stroke:#26344d;stroke-width:2.5}.blue{fill:#edf3ff;stroke:#3b64b0;stroke-width:2.8}.green{fill:#eef8f1;stroke:#2f7b4d;stroke-width:2.8}.orange{fill:#fff4e8;stroke:#aa6721;stroke-width:2.8}.purple{fill:#f5efff;stroke:#7044aa;stroke-width:2.8}.red{fill:#fbeeee;stroke:#a94747;stroke-width:2.8}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.label{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.body{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#354056}.small{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4f596c}.arrow{fill:none;stroke:#52617a;stroke-width:4;marker-end:url(#a)}.axis{stroke:#25324a;stroke-width:2.5}.grid{stroke:#d5dae2;stroke-width:1.4;stroke-dasharray:5 6}</style><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#52617a"/></marker></defs><rect class="bg" width="1400" height="900"/><text class="title" x="700.0" y="55" text-anchor="middle">Two KL Mechanisms, Two Different Jobs</text><rect class="green" x="90" y="140" width="540" height="560" rx="24"/><text class="label" x="360" y="195" text-anchor="middle">KL #1 — PPO Clip</text><text class="body" x="360" y="245" text-anchor="middle">Close to πold</text><text class="body" x="360" y="285" text-anchor="middle">Reference refreshed every batch</text><text class="body" x="360" y="345" text-anchor="middle">Lives inside the actor objective</text><text class="body" x="360" y="405" text-anchor="middle">Controls one update step</text><text class="body" x="360" y="465" text-anchor="middle">Protects importance-sampling validity</text><text class="body" x="360" y="525" text-anchor="middle">Without it: unstable batch updates</text><text class="label" x="360" y="645" text-anchor="middle">Speed limit</text><rect class="purple" x="770" y="140" width="540" height="560" rx="24"/><text class="label" x="1040" y="195" text-anchor="middle">KL #2 — Reference Leash</text><text class="body" x="1040" y="245" text-anchor="middle">Close to πref</text><text class="body" x="1040" y="285" text-anchor="middle">Frozen SFT reference for the whole run</text><text class="body" x="1040" y="345" text-anchor="middle">Lives inside the token reward</text><text class="body" x="1040" y="405" text-anchor="middle">Controls cumulative policy drift</text><text class="body" x="1040" y="465" text-anchor="middle">Anchors language and reward validity</text><text class="body" x="1040" y="525" text-anchor="middle">Without it: reward hacking and drift</text><text class="label" x="1040" y="645" text-anchor="middle">Distance from home</text><text class="body" x="700" y="800" text-anchor="middle">Small steps do not bound the total journey; staying near home does not guarantee each step is safe.</text></svg>