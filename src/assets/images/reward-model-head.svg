<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img"><style>.bg{fill:#faf9f6}.box{fill:#fff;stroke:#26344d;stroke-width:2.5}.blue{fill:#edf3ff;stroke:#3b64b0;stroke-width:2.8}.green{fill:#eef8f1;stroke:#2f7b4d;stroke-width:2.8}.orange{fill:#fff4e8;stroke:#aa6721;stroke-width:2.8}.purple{fill:#f5efff;stroke:#7044aa;stroke-width:2.8}.red{fill:#fbeeee;stroke:#a94747;stroke-width:2.8}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.label{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.body{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#354056}.small{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4f596c}.arrow{fill:none;stroke:#52617a;stroke-width:4;marker-end:url(#a)}.axis{stroke:#25324a;stroke-width:2.5}.grid{stroke:#d5dae2;stroke-width:1.4;stroke-dasharray:5 6}</style><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#52617a"/></marker></defs><rect class="bg" width="1400" height="900"/><text class="title" x="700.0" y="55" text-anchor="middle">Reward Model: Same Transformer, Different Head</text><rect class="blue" x="80" y="155" width="270" height="150" rx="20"/><text class="label" x="215" y="205" text-anchor="middle">Prompt + Response</text><text class="body" x="215" y="245" text-anchor="middle">token sequence</text><path class="arrow" d="M350 230 L450 230"/><rect class="box" x="450" y="120" width="390" height="220" rx="20"/><text class="label" x="645" y="170" text-anchor="middle">Transformer Trunk</text><text class="body" x="645" y="210" text-anchor="middle">h₁, h₂, …, h_T ∈ ℝᵈ</text><text class="body" x="645" y="250" text-anchor="middle">causal hidden representations</text><text class="body" x="645" y="290" text-anchor="middle">h_T has read the full sequence</text><path class="arrow" d="M840 230 L940 230"/><rect class="green" x="940" y="155" width="340" height="150" rx="20"/><text class="label" x="1110" y="205" text-anchor="middle">Scalar Reward Head</text><text class="body" x="1110" y="245" text-anchor="middle">rφ = wᵀh_T + b</text><text class="body" x="1110" y="275" text-anchor="middle">one response → one number</text><text class="label" x="700" y="470" text-anchor="middle">Contrast with the language head</text><rect class="purple" x="240" y="520" width="400" height="170" rx="20"/><text class="label" x="440" y="570" text-anchor="middle">Language Head</text><text class="body" x="440" y="610" text-anchor="middle">one logit per vocabulary token</text><text class="body" x="440" y="645" text-anchor="middle">large |V| × d projection</text><rect class="orange" x="760" y="520" width="400" height="170" rx="20"/><text class="label" x="960" y="570" text-anchor="middle">Reward Head</text><text class="body" x="960" y="610" text-anchor="middle">one d-dimensional vector + bias</text><text class="body" x="960" y="645" text-anchor="middle">single scalar for the full response</text></svg>