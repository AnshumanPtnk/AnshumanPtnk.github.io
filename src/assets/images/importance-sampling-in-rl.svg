<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="rlArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9"/>
  <text x="600" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#1e293b">Importance Sampling in Reinforcement Learning</text>
  <text x="600" y="67" text-anchor="middle" font-size="13" fill="#64748b">Reuse behaviour-policy data by correcting each action with a policy ratio</text>

  <rect x="55" y="105" width="255" height="150" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="182" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Behaviour policy μ</text>
  <text x="182" y="164" text-anchor="middle" font-size="11.5" fill="#1e3a8a">interacts with environment</text>
  <text x="182" y="185" text-anchor="middle" font-size="11.5" fill="#1e3a8a">and collects (s, a, A)</text>
  <rect x="93" y="207" width="178" height="30" rx="15" fill="#eff6ff"/>
  <text x="182" y="227" text-anchor="middle" font-size="10.5" fill="#1e40af">data distribution is fixed</text>

  <line x1="310" y1="180" x2="405" y2="180" stroke="#64748b" stroke-width="2.5" marker-end="url(#rlArrow)"/>

  <rect x="415" y="105" width="370" height="150" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Policy ratio</text>
  <text x="600" y="180" text-anchor="middle" font-size="20" font-weight="700" fill="#78350f">ρ(s,a) = π(a|s) / μ(a|s)</text>
  <text x="600" y="215" text-anchor="middle" font-size="11.5" fill="#92400e">How much more or less the target policy likes a</text>
  <text x="600" y="234" text-anchor="middle" font-size="11.5" fill="#92400e">than the policy that actually sampled it</text>

  <line x1="785" y1="180" x2="880" y2="180" stroke="#64748b" stroke-width="2.5" marker-end="url(#rlArrow)"/>

  <rect x="890" y="105" width="255" height="150" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1017" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Target-policy estimate</text>
  <text x="1017" y="174" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">weighted signal = ρ · A</text>
  <text x="1017" y="207" text-anchor="middle" font-size="11" fill="#166534">ρ &gt; 1 → upweight</text>
  <text x="1017" y="229" text-anchor="middle" font-size="11" fill="#166534">ρ &lt; 1 → downweight</text>

  <rect x="55" y="305" width="500" height="285" rx="16" fill="#ffffff" stroke="#94a3b8"/>
  <text x="305" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Single action or PPO minibatch</text>
  <g>
    <rect x="92" y="380" width="82" height="55" rx="9" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="133" y="404" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">sample</text>
    <text x="133" y="422" text-anchor="middle" font-size="10" fill="#64748b">(sₜ,aₜ)</text>
    <line x1="174" y1="407" x2="225" y2="407" stroke="#64748b" stroke-width="2" marker-end="url(#rlArrow)"/>
    <rect x="235" y="370" width="140" height="75" rx="9" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="305" y="399" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">ρₜ = πθ / πold</text>
    <text x="305" y="420" text-anchor="middle" font-size="10" fill="#78350f">one local ratio</text>
    <line x1="375" y1="407" x2="425" y2="407" stroke="#64748b" stroke-width="2" marker-end="url(#rlArrow)"/>
    <rect x="435" y="380" width="82" height="55" rx="9" fill="#dcfce7" stroke="#86efac"/>
    <text x="476" y="404" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">ρₜAₜ</text>
    <text x="476" y="422" text-anchor="middle" font-size="10" fill="#14532d">surrogate</text>
  </g>
  <text x="305" y="493" text-anchor="middle" font-size="11.5" fill="#475569">Stable while πθ remains close to πold.</text>
  <rect x="142" y="518" width="326" height="42" rx="10" fill="#eff6ff"/>
  <text x="305" y="544" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">PPO clips extreme benefit from ratio drift.</text>

  <rect x="645" y="305" width="500" height="285" rx="16" fill="#ffffff" stroke="#dc2626"/>
  <text x="895" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">Full trajectory correction</text>
  <rect x="690" y="375" width="410" height="65" rx="10" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="895" y="402" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">W(τ) = ρ₀ × ρ₁ × ··· × ρT−1</text>
  <text x="895" y="426" text-anchor="middle" font-size="10.5" fill="#991b1b">each decision multiplies another source of variance</text>
  <g fill="#fef2f2" stroke="#fca5a5">
    <circle cx="715" cy="490" r="25"/><circle cx="785" cy="490" r="25"/>
    <circle cx="855" cy="490" r="25"/><circle cx="925" cy="490" r="25"/>
    <circle cx="995" cy="490" r="25"/><circle cx="1065" cy="490" r="25"/>
  </g>
  <g text-anchor="middle" font-size="10.5" font-weight="700" fill="#991b1b">
    <text x="715" y="494">1.1</text><text x="785" y="494">0.8</text>
    <text x="855" y="494">1.3</text><text x="925" y="494">0.6</text>
    <text x="995" y="494">1.4</text><text x="1065" y="494">0.7</text>
  </g>
  <text x="895" y="550" text-anchor="middle" font-size="11.5" fill="#7f1d1d">Products can collapse toward zero or explode.</text>

  <rect x="180" y="630" width="840" height="48" rx="12" fill="#f1f5f9"/>
  <text x="600" y="651" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">Importance Sampling makes old experience useful, not permanently valid.</text>
  <text x="600" y="668" text-anchor="middle" font-size="10.5" fill="#64748b">Policy drift increases ratio variance, so practical algorithms constrain updates and refresh data.</text>
</svg>
