<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
<title id="title">PPO batch reuse across epochs</title>
<desc id="desc">A diagram showing one rollout batch reused over several epochs with ratios drifting and clipping silencing overextended samples before the batch is discarded.</desc>
<style>
  .bg{fill:#faf9f6}.batch{fill:#edf3ff;stroke:#3b64b0;stroke-width:2.8}.epoch{fill:#fff;stroke:#26344d;stroke-width:2.4}.clip{fill:#fff4e8;stroke:#aa6721;stroke-width:2.8}.discard{fill:#f6eeee;stroke:#9c4040;stroke-width:2.8}
  .title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.label{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.body{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#354056}.arrow{fill:none;stroke:#52617a;stroke-width:4;marker-end:url(#a)}.dash{stroke:#8a95a8;stroke-width:2;stroke-dasharray:8 8}
</style>
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#52617a"/></marker></defs>
<rect class="bg" width="1400" height="900"/>
<text class="title" x="700" y="58" text-anchor="middle">How PPO Reuses One Rollout Batch</text>

<rect class="batch" x="90" y="330" width="300" height="160" rx="22"/>
<text class="label" x="240" y="382" text-anchor="middle">One Rollout Batch</text>
<text class="body" x="240" y="420" text-anchor="middle">fixed states, actions, returns</text>
<text class="body" x="240" y="450" text-anchor="middle">advantages and old log-probs</text>

<path class="arrow" d="M390 410 L480 410"/>

<rect class="epoch" x="480" y="115" width="300" height="125" rx="20"/>
<text class="label" x="630" y="160" text-anchor="middle">Epoch 1</text>
<text class="body" x="630" y="198" text-anchor="middle">ratios begin near 1</text>

<rect class="epoch" x="480" y="285" width="300" height="125" rx="20"/>
<text class="label" x="630" y="330" text-anchor="middle">Epoch 2</text>
<text class="body" x="630" y="368" text-anchor="middle">policy starts to drift</text>

<rect class="epoch" x="480" y="455" width="300" height="125" rx="20"/>
<text class="label" x="630" y="500" text-anchor="middle">Epoch 3</text>
<text class="body" x="630" y="538" text-anchor="middle">some samples clip</text>

<rect class="epoch" x="480" y="625" width="300" height="125" rx="20"/>
<text class="label" x="630" y="670" text-anchor="middle">Epoch K</text>
<text class="body" x="630" y="708" text-anchor="middle">marginal lesson fades</text>

<line class="dash" x1="780" y1="178" x2="900" y2="178"/>
<line class="dash" x1="780" y1="348" x2="900" y2="348"/>
<line class="dash" x1="780" y1="518" x2="900" y2="518"/>
<line class="dash" x1="780" y1="688" x2="900" y2="688"/>

<rect class="clip" x="900" y="245" width="370" height="255" rx="22"/>
<text class="label" x="1085" y="295" text-anchor="middle">Clip Protects Reuse</text>
<text class="body" x="1085" y="338" text-anchor="middle">inside band: samples keep teaching</text>
<text class="body" x="1085" y="378" text-anchor="middle">past relevant edge: objective flattens</text>
<text class="body" x="1085" y="418" text-anchor="middle">overextended samples go silent</text>
<text class="body" x="1085" y="458" text-anchor="middle">stale evidence cannot push forever</text>

<path class="arrow" d="M1085 500 L1085 625"/>
<rect class="discard" x="900" y="625" width="370" height="125" rx="20"/>
<text class="label" x="1085" y="670" text-anchor="middle">Discard Batch</text>
<text class="body" x="1085" y="708" text-anchor="middle">collect fresh data with improved policy</text>
</svg>